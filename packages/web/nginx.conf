server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Body / header limits. Todos are <=500 chars per the Zod schema; 16k is
    # comfortably above the largest legitimate request and below anything an
    # abusive client would send.
    client_max_body_size  16k;
    client_body_timeout   10s;
    client_header_timeout 10s;

    # Security headers applied at the server level. Note: nginx does NOT inherit
    # `add_header` into a location that defines its own — we re-declare these in
    # `location = /index.html` (the only place that adds a Cache-Control header
    # and would otherwise drop these).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    # HSTS is harmless on plain HTTP (browsers ignore it) but takes effect the
    # moment this stack ever runs behind HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block hidden files (.env, .git, .DS_Store, .htpasswd, ...) and source maps
    # from ever being served by the SPA fallback. Belt-and-braces — the build
    # output should not contain these, but a misconfigured `vite.config.ts` or
    # an accidental copy into the dist directory should not become a leak.
    location ~ /\. { deny all; return 404; }
    location ~ \.map$ { deny all; return 404; }

    # /api/healthz is reachable only from the in-container loopback (used by the
    # Docker HEALTHCHECK probe). External callers get a generic 404 — the route
    # otherwise leaks DB liveness as a DoS-success oracle.
    location = /api/healthz {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass         http://api:3000/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host               $proxy_host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $remote_addr;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_down;
    }

    # Reverse-proxy API calls to the api service.
    # Browser hits /api/todos -> nginx forwards to http://api:3000/todos.
    location /api/ {
        # Method allow-list. TRACE/CONNECT and other rarely-needed verbs never
        # reach the upstream Fastify. OPTIONS is included so CORS preflights
        # still work if the api is ever called cross-origin.
        limit_except GET POST PATCH DELETE OPTIONS { deny all; }

        proxy_pass         http://api:3000/;
        proxy_http_version 1.1;

        # `Host: $proxy_host` (api:3000) — internal upstream value, not the
        # browser-supplied Host. Avoids forwarding attacker-controlled hosts.
        proxy_set_header   Host               $proxy_host;
        proxy_set_header   X-Real-IP          $remote_addr;
        # Overwrite, do not append. `$proxy_add_x_forwarded_for` would chain a
        # client-supplied XFF header; the api should see only the real peer.
        proxy_set_header   X-Forwarded-For    $remote_addr;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        # Lets the api reconstruct the public URL (since /api is stripped on proxy_pass).
        proxy_set_header   X-Forwarded-Prefix /api;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffer_size     16k;
        proxy_buffers         4 16k;

        # Render upstream failures as JSON so the SPA's error handling stays consistent.
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_down;
    }

    location @api_down {
        default_type application/json;
        return 503 '{"error":"upstream","message":"api unavailable","code":"upstream.unavailable"}';
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable cache on the entrypoint so deploys propagate immediately.
    # Re-declare security headers because any `add_header` here disables inheritance.
    location = /index.html {
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

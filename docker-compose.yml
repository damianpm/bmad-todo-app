services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todos}
      POSTGRES_USER: ${POSTGRES_USER:-todos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todos} -d ${POSTGRES_DB:-todos}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-todos}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-todos}
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 by default so a developer on a Wi-Fi network does not
      # accidentally expose the dev stack to the LAN. Set BIND_HOST=0.0.0.0 to
      # opt in to LAN access (e.g. testing from another device).
      - "${BIND_HOST:-127.0.0.1}:${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # Probe `/api/healthz` (not `/`) so the web container is only marked healthy
      # when the proxy chain to the api is actually working. Probing `/` would
      # always succeed against the static SPA even if the upstream is down.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  # No explicit `name:` — let Compose project-prefix the volume so different
  # `-p <project>` invocations get isolated storage. The persistence test
  # (scripts/test-persistence.sh) depends on this isolation.
  db_data: {}

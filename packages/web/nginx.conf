server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reverse-proxy API calls to the api service.
    # Browser hits /api/todos -> nginx forwards to http://api:3000/todos.
    location /api/ {
        proxy_pass         http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable cache on the entrypoint so deploys propagate immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
